services:
  - type: web
    name: age-detection
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port=10000 --server.address=0.0.0.0
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
